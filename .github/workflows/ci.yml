name: CI

on:
  pull_request:
  push:
    branches: ["master"]

jobs:
  check:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      - run: nix build .#ci
